<!-- Assignment 1 to compare three numbers and print the max using ternary operator -->
<!DOCTYPE html>
<html>
<head>
    <title>Find Maximum of Three Numbers</title>
</head>
<body>

<script>
    
    var a = 10;
    var b = 60;
    var c = 30;

    let max = (a > b)  ? (a > c ? a : c) : (b > c ? b : c);
    
    document.write("Maximum number is: " + max);
</script>

</body>
</html>
